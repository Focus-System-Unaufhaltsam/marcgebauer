<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG PRECISION | FOCUS SYSTEM</title>
    <style>
        :root { 
            --mg-dark: #343536; 
            --mg-light: #f1f1f1; 
            --mg-gold: #c5a059; 
            --danger: #c92a2a;
            --success: #0f9d58;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--mg-light); 
            color: var(--mg-dark); 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            touch-action: none; 
        }

        /* HUD */
        .hud { 
            position: absolute; top: 0; left: 0; right: 0;
            z-index: 20; display: grid; grid-template-columns: repeat(3, 1fr); 
            padding: 12px 15px; background: var(--mg-dark);
            border-bottom: 3px solid var(--mg-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .stat { text-align: center; border-right: 1px solid rgba(255,255,255,0.1); }
        .stat:last-child { border-right: none; }
        .stat .label { font-size: 9px; text-transform: uppercase; color: #aaa; letter-spacing: 2px; margin-bottom: 2px; }
        .stat .value { font-size: 20px; font-weight: bold; color: #fff; }

        /* Spielfeld */
        .game-shell { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 100%; 
            height: 100%; 
            padding-top: 60px; 
            background: radial-gradient(circle, #fff 0%, #eee 100%);
        }
        
        canvas { 
            display: block;
            width: 100%; 
            height: auto;
            max-width: 95vw; 
            max-height: 75vh; 
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2)); 
            touch-action: none;
        }

        /* Overlays */
        .overlay { position: absolute; inset: 0; background: rgba(52, 53, 54, 0.95); display: flex; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; backdrop-filter: blur(5px); }
        .overlay.hidden { display: none !important; }
        
        .card { max-width: 440px; width: 100%; border-top: 4px solid var(--mg-gold); padding: 35px 25px; background: #fff; border-radius: 2px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        
        h1 { font-size: 24px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 5px; color: var(--mg-dark); font-weight: 900; }
        .subtitle { font-size: 10px; color: #888; margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase; }
        
        .btn { background: var(--mg-dark); color: #fff; border: none; padding: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; width: 100%; margin-bottom: 12px; transition: 0.2s; }
        .btn:hover { background: var(--mg-gold); color: #000; }
        .btn-gold { background: var(--mg-gold); color: #000; }

        #nameInput, #igInput { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ccc; font-size: 15px; text-align: center; font-weight: bold; outline: none; text-transform: uppercase; }
        
        .lb-container { margin: 20px 0; text-align: left; }
        .lb-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #eee; font-weight: bold; }
    </style>
</head>
<body>
    <section class="hud">
        <div class="stat"><div class="label">Score</div><div class="value" id="scoreValue">0</div></div>
        <div class="stat"><div class="label">Boxes</div><div class="value" id="boxValue">2</div></div>
        <div class="stat"><div class="label">Time</div><div class="value" id="timeValue">0.0s</div></div>
    </section>

    <main class="game-shell">
        <canvas id="gameCanvas" width="960" height="540"></canvas>
        
        <div class="overlay" id="startOverlay">
            <div class="card">
                <h1>FOCUS SYSTEM</h1>
                <p class="subtitle">MG PERFORMANCE DIAGNOSTICS</p>
                <button class="btn" id="startBtn">START SYSTEM</button>
                <div class="lb-container">
                    <p style="font-size:10px; font-weight:900; margin-bottom:8px; color:var(--mg-gold);">GLOBAL RANKING</p>
                    <div id="leaderboardList"></div>
                </div>
            </div>
        </div>

        <div class="overlay hidden" id="gameOverOverlay">
            <div class="card">
                <h1 style="color:var(--danger);">SYSTEM FAILED</h1>
                <p id="aiText" style="font-size:13px; font-weight:bold; font-style:italic; margin:15px 0; min-height:40px; color:#555; line-height:1.4;"></p>
                <div id="finalScore" style="font-size:60px; font-weight:900; color:var(--mg-dark);">0</div>
                <p id="finalTime" style="font-size:12px; opacity:0.6; margin-bottom:20px;">TIME: 0.00s</p>
                
                <div id="rewardSection" style="display:none; background:var(--mg-light); padding:15px; margin-bottom:15px; border-left:4px solid var(--mg-gold);">
                    <p style="font-size:11px; font-weight:900; margin-bottom:10px;">ELITE STATUS: CLAIM REWARD</p>
                    <input type="text" id="igInput" placeholder="INSTAGRAM HANDLE">
                    <button class="btn btn-gold" id="claimBtn">CONFIRM WITH MARC</button>
                </div>

                <input type="text" id="nameInput" placeholder="YOUR NAME" maxlength="15">
                <button class="btn" id="saveBtn">SAVE RANK</button>
                <button class="btn" style="background:#eee; color:#000;" onclick="location.reload()">REBOOT</button>
            </div>
        </div>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyC0olKESyTP0rXUlnjGstLlGN50I1m_O2A", authDomain: "mg-challenge.firebaseapp.com", projectId: "mg-challenge", storageBucket: "mg-challenge.firebasestorage.app", messagingSenderId: "472289048663", appId: "1:472289048663:web:cc68ded6007e1e822c4b12" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const dbRef = collection(db, "leaderboard_marc");

    const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
    
    let state = {
        running: false, score: 0, startTime: 0, totalTime: 0, 
        phase: "idle", phaseStartedAt: 0, boxes: [], 
        correctId: null, selectedId: null, swapsRemaining: 0, activeSwap: null,
        showBallTime: 1400, breatherMs: 300
    };

    function getMarcQuote(score) {
        if (score <= 5) return '"Fokus verloren. In der Zeit habe ich drei Uhren verkauft."';
        if (score <= 10) return '"Einstieg ist gemacht. Aber für eine Patek reicht das noch nicht."';
        if (score <= 15) return '"Du wirst wach. Aber wir machen hier Business, keine Spielchen."';
        if (score <= 20) return '"Gute Performance. Da erkenne ich langsam den Macher-Instinkt."';
        if (score <= 25) return '"Stark. Mit dieser Präzision hättest du den Deal heute durchgezogen."';
        return '"Absolute Elite. Du hast das System dominiert. Respekt."';
    }

    function getBrandColor() {
        return getComputedStyle(document.documentElement).getPropertyValue('--mg-gold').trim();
    }

    function buildRound() {
        if (state.score >= 29) { finish(true); return; }
        state.boxes = []; state.selectedId = null; state.activeSwap = null;
        const count = Math.min(30, 2 + state.score);
        const cols = Math.ceil(Math.sqrt(count));
        const boxW = Math.max(45, Math.min(92, (canvas.width - 160) / cols - 24));
        const gridW = cols * boxW + (cols - 1) * 24;
        const gridH = Math.ceil(count / cols) * boxW + (Math.ceil(count / cols) - 1) * 24;
        const startX = (canvas.width - gridW) / 2; 
        const startY = 160 + ((canvas.height - 200) - gridH) / 2;

        for (let i = 0; i < count; i++) {
            const r = Math.floor(i / cols), c = i % cols;
            state.boxes.push({ id: i, x: startX + c * (boxW + 24), y: startY + r * (boxW + 24), w: boxW, h: boxW, lift: 0 });
        }
        state.correctId = Math.floor(Math.random() * count);
        state.swapsRemaining = Math.max(4, 3 + Math.floor(count * 1.5));
        state.showBallTime = state.score >= 14 ? 1000 : 1400;
        setPhase("show");
    }

    function startNextSwap() {
        if (state.swapsRemaining <= 0) { state.activeSwap = null; setPhase("wait"); return; }
        let a, b;
        if (Math.random() < 0.6) {
            a = state.boxes.findIndex(box => box.id === state.correctId);
            b = Math.floor(Math.random() * state.boxes.length);
            while (b === a) b = Math.floor(Math.random() * state.boxes.length);
        } else {
            a = Math.floor(Math.random() * state.boxes.length);
            b = Math.floor(Math.random() * state.boxes.length);
            while (b === a) b = Math.floor(Math.random() * state.boxes.length);
        }
        state.activeSwap = {
            aId: state.boxes[a].id, bId: state.boxes[b].id, 
            aStartX: state.boxes[a].x, bStartX: state.boxes[b].x, aStartY: state.boxes[a].y, bStartY: state.boxes[b].y,
            aTargetX: state.boxes[b].x, bTargetX: state.boxes[a].x, aTargetY: state.boxes[b].y, bTargetY: state.boxes[a].y,
            start: performance.now(), duration: Math.max(140, (2200 - state.score * 90) / 7.5)
        };
        state.swapsRemaining--;
    }

    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

    function update(ts) {
        if (!state.running) return;
        if (state.phase === "show" && ts - state.phaseStartedAt > state.showBallTime) { setPhase("shuffle"); startNextSwap(); }
        else if (state.phase === "shuffle") {
            if (!state.activeSwap) { startNextSwap(); return; }
            const s = state.activeSwap, p = Math.min(1, (ts - s.start) / s.duration), e = easeInOutQuad(p);
            const bA = state.boxes.find(b => b.id === s.aId), bB = state.boxes.find(b => b.id === s.bId);
            if(bA && bB) {
                bA.x = lerp(s.aStartX, s.aTargetX, e); bB.x = lerp(s.bStartX, s.bTargetX, e);
                bA.y = lerp(s.aStartY, s.aTargetY, e); bB.y = lerp(s.bStartY, s.bTargetY, e);
                if (p >= 1) { bA.x = s.aTargetX; bA.y = s.aTargetY; bB.x = s.bTargetX; bB.y = s.bTargetY; state.activeSwap = null; }
            }
        } else if (state.phase === "wait" && ts - state.phaseStartedAt > state.breatherMs) setPhase("pick");
        else if (state.phase === "reveal") {
            const sel = state.boxes.find(b => b.id === state.selectedId), cor = state.boxes.find(b => b.id === state.correctId);
            if (sel) sel.lift = Math.min(sel.h * 0.8, sel.lift + 5);
            if (cor && cor.id !== state.selectedId) cor.lift = Math.min(cor.h * 0.8, cor.lift + 5);
            if (ts - state.phaseStartedAt > 1200) {
                if (state.selectedId === state.correctId) { state.score++; buildRound(); }
                else { if(state.score >= 18) setTimeout(() => finish(false), 600); else finish(false); }
            }
        }
        if (state.phase !== "reveal") state.boxes.forEach(b => b.lift = Math.max(0, b.lift - 6));
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        state.boxes.forEach(box => {
            const y = box.y - box.lift;
            ctx.save();
            ctx.fillStyle = "#fff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
            ctx.strokeRect(box.x, y, box.w, box.h); ctx.fillRect(box.x, y, box.w, box.h);
            
            if (state.phase === "show" && box.id === state.correctId) {
                ctx.save(); const pulse = Math.sin(performance.now() / 150) * 0.2 + 0.8; ctx.globalAlpha = pulse;
                ctx.strokeStyle = getBrandColor(); ctx.lineWidth = 6; ctx.strokeRect(box.x - 4, y - 4, box.w + 8, box.h + 8);
                ctx.fillStyle = "#000"; ctx.font = `900 ${Math.floor(box.w * 0.18)}px Arial`; ctx.textAlign = "center";
                ctx.fillText("FOCUS", box.x + box.w/2, y + box.h/2 + (box.w * 0.06)); ctx.restore();
            }

            if ((state.phase === "reveal") && box.id === state.correctId) {
                ctx.fillStyle = "#c5a059"; ctx.font = `${box.w * 0.5}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("👑", box.x + box.w/2, y + box.h/2);
            }
            if (state.phase === "reveal" && box.id === state.selectedId) {
                ctx.strokeStyle = (state.selectedId === state.correctId ? "#0f9d58" : "#d92d20");
                ctx.lineWidth = 6; ctx.strokeRect(box.x - 4, y - 4, box.w + 8, box.h + 8);
            }
            ctx.restore();
        });
    }

    function finish(victory) {
        state.running = false;
        state.totalTime = (performance.now() - state.startTime) / 1000;
        document.getElementById("gameOverOverlay").classList.remove("hidden");
        const finalBoxes = Math.min(30, state.score + 2);
        document.getElementById("finalScore").textContent = finalBoxes;
        document.getElementById("finalTime").textContent = `TIME: ${state.totalTime.toFixed(2)}s`;
        document.getElementById("aiText").textContent = getMarcQuote(state.score);
        if (finalBoxes >= 30 || victory) document.getElementById("rewardSection").style.display = "block";
    }

    function setPhase(p) { state.phase = p; state.phaseStartedAt = performance.now(); }

    function handleInteraction(x, y) {
        if (state.phase === "pick") {
            state.boxes.forEach(b => { if (x >= b.x && x <= b.x + b.w && y >= b.y - b.lift && y <= b.y - b.lift + b.h) { state.selectedId = b.id; setPhase("reveal"); } });
        }
    }

    canvas.onmousedown = e => { const r = canvas.getBoundingClientRect(); handleInteraction((e.clientX - r.left)*(canvas.width/r.width), (e.clientY - r.top)*(canvas.height/r.height)); };
    canvas.addEventListener("touchstart", e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); handleInteraction((e.touches[0].clientX - r.left)*(canvas.width/r.width), (e.touches[0].clientY - r.top)*(canvas.height/r.height)); }, {passive:false});

    document.getElementById("startBtn").onclick = () => { state.running = true; state.score = 0; state.startTime = performance.now(); document.getElementById("startOverlay").classList.add("hidden"); buildRound(); };
    
    document.getElementById("saveBtn").onclick = async () => {
        const name = document.getElementById("nameInput").value.trim().toUpperCase() || "ANON";
        if (!auth.currentUser) await signInAnonymously(auth);
        const scoreToSave = Math.min(29, state.score);
        await setDoc(doc(db, "leaderboard_marc", auth.currentUser.uid), { name, score: scoreToSave, time: state.totalTime, timestamp: serverTimestamp() });
        location.reload();
    };

    document.getElementById("claimBtn").onclick = async () => {
        const ig = document.getElementById("igInput").value.trim();
        if (!ig) return;
        await setDoc(doc(db, "claims_marc", auth.currentUser.uid), { ig, score: state.score, time: state.totalTime, timestamp: serverTimestamp() });
        document.getElementById("rewardSection").innerHTML = "<p style='font-size:12px; font-weight:900; color:var(--success)'>CLAIMED. MARC WILL BE NOTIFIED.</p>";
    };

    onAuthStateChanged(auth, user => {
        if (user) {
            onSnapshot(dbRef, snap => {
                const list = document.getElementById("leaderboardList"); list.innerHTML = "";
                const items = [];
                snap.forEach(d => items.push(d.data()));
                // Sort in memory to avoid needing a Firestore composite index
                items.sort((a, b) => b.score - a.score || a.time - b.time);
                items.slice(0, 5).forEach(data => {
                    list.innerHTML += `<div class="lb-row"><span>${data.name}</span><span>${data.score + 2} (${data.time.toFixed(1)}s)</span></div>`;
                });
            }, err => {
                console.error("Firestore Error:", err);
            });
        }
    });
    signInAnonymously(auth);

    function loop(ts) { 
        update(ts); draw(); 
        if(state.running) {
            document.getElementById("timeValue").textContent = ((performance.now() - state.startTime)/1000).toFixed(1) + "s";
            document.getElementById("scoreValue").textContent = state.score;
            document.getElementById("boxValue").textContent = Math.min(30, state.score + 2);
        }
        requestAnimationFrame(loop); 
    }
    requestAnimationFrame(loop);
</script>
</body>
</html>

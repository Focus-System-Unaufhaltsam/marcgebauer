<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title id="uiPageTitle">MASTER PRECISION | FOCUS SYSTEM</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      --brand-color: #c5a059; /* Wird per JS ueberschrieben */
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text-main: #343536;
      --success: #0f9d58;
      --danger: #c92a2a;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Helvetica Neue', Arial, sans-serif; -webkit-tap-highlight-color: transparent; }

    body { background:var(--bg); color:var(--text-main); min-height:100vh; padding:20px 14px 40px; overflow-x:hidden; }

    .wrap { width:100%; max-width:980px; margin:0 auto; display:flex; flex-direction:column; gap:18px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .title h1 { font-size:clamp(24px, 5vw, 42px); line-height:1; font-weight:900; letter-spacing:-0.8px; text-transform: uppercase;}

    .btn { appearance:none; border:none; background:#343536; color:#fff; padding:16px 22px; border-radius:14px; font-weight: 900; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; transition:transform .12s ease; text-transform: uppercase; }
    .btn:active { transform:scale(.98); }
    .btn-brand { background: var(--brand-color); color: #000; }

    /* HUD: Focus on Boxes & Best */
    .hud { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:12px; }
    .stat { border:2px solid #000; border-radius:18px; padding:12px; background:#fff; text-align:center; }
    .stat .label { font-size:10px; opacity:.6; text-transform:uppercase; font-weight:800; margin-bottom:4px; }
    .stat .value { font-size:clamp(18px, 4vw, 28px); font-weight:900; line-height:1; color: var(--brand-color); }

    .game-shell { position:relative; width:100%; background:#fff; border:2px solid #000; border-radius:24px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,.08); }
    canvas { display:block; width:100%; height:auto; background: radial-gradient(circle, #fff 0%, #eee 100%); touch-action: none; }

    .overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:20px; background:rgba(52, 53, 54, 0.95); text-align:center; z-index:100; backdrop-filter: blur(5px); color: #fff; }
    .overlay.hidden { display:none; }

    .card { width:min(100%, 480px); background:#fff; border: 2px solid #000; border-top: 4px solid var(--brand-color); border-radius: 4px; padding:30px 20px; color: #000; }
    .card h2 { font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }

    .leaderboard-container { background:#fff; border:2px solid #000; border-radius:22px; padding:20px; margin-top:10px; color: #000; }
    .leaderboard-title { font-weight:900; text-transform:uppercase; margin-bottom:10px; border-bottom:2px solid #000; padding-bottom:5px; }
    .leaderboard-entry { display:flex; justify-content:space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-weight:700; list-style:none; font-size: 15px; }
    .leaderboard-entry .rank-name { display: flex; gap: 10px; align-items: center; }
    .leaderboard-entry .rank-number { font-weight: 900; color: var(--brand-color); min-width: 25px; }

    #nameInput, #igInput { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ccc; font-size: 15px; text-align: center; font-weight: bold; outline: none; text-transform: uppercase; }
    #errorMsg { color: var(--danger); font-size: 11px; font-weight: 900; margin-bottom: 10px; display: none; text-transform: uppercase; }

    .legal-links { margin-top: 20px; display: flex; justify-content: center; gap: 20px; }
    .legal-links a { font-size: 11px; color: #aaa; text-decoration: none; font-weight: bold; text-transform: uppercase; }

    @media (max-width:720px){ .btn { width:100%; } }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="title"><h1 id="uiBrandTitle">UNAUFHALTSAM</h1></div>
      <button class="btn" id="resetBtn">RESET</button>
    </div>

    <section class="hud">
      <div class="stat"><div class="label">Boxes</div><div class="value" id="boxValue">2</div></div>
      <div class="stat"><div class="label">Best</div><div class="value" id="bestValue">0</div></div>
    </section>

    <section class="game-shell">
      <canvas id="gameCanvas" width="960" height="540"></canvas>

      <div class="overlay" id="startOverlay">
        <div class="card">
          <h2 id="uiBrandSub">MG PRECISION CHALLENGE</h2>
          <p id="uiStartDesc">Focus the right box. Losing is instant.</p>
          <button class="btn btn-brand" id="startBtn" style="margin-top:20px; width:100%; color:#fff;">START SYSTEM</button>
          
          <div class="legal-links">
            <a href="impressum.html">Imprint</a>
            <a href="datenschutz.html">Privacy</a>
          </div>
        </div>
      </div>

      <div class="overlay hidden" id="nameOverlay">
        <div class="card">
          <h2>FOCUS CONFIRMED!</h2>
          <p>Secure your spot in the global ranking:</p>
          <div id="errorMsg"></div>
          <input type="text" id="nameInput" placeholder="YOUR NAME" maxlength="15" />
          <button class="btn btn-brand" id="saveScoreBtn" style="width:100%; color:#fff;">SAVE RANK</button>
        </div>
      </div>

      <div class="overlay hidden" id="gameOverOverlay">
        <div class="card">
          <h2 id="uiGameOverFail" style="color:var(--danger)">SYSTEM FAILED</h2>
          <p id="aiText" style="font-size:13px; font-weight:bold; font-style:italic; margin:15px 0; min-height:40px; color:#555;"></p>
          <div id="finalScore" style="font-size:60px; font-weight:900; margin:10px 0; color: #000;">0 BOXES</div>
          <p id="finalTime" style="font-size:16px; font-weight:900; color:var(--brand-color); margin-bottom:20px;">TIME: 0.00s</p>
          
          <button class="btn" id="restartBtn" style="width:100%; margin-bottom:12px;">REBOOT</button>
          
          <a href="https://www.marcgebauer.com" target="_blank" class="btn btn-brand" style="width:100%; color:#fff; margin-bottom:20px; background-color: #c5a059;">
            ZUM MG SYSTEM
          </a>

          <div id="rewardSection" style="display:none; background:var(--bg); padding:15px; margin-bottom:15px; border-left:4px solid var(--brand-color);">
            <p id="uiRewardTitle" style="font-size:11px; font-weight:900; margin-bottom:10px;">ELITE STATUS: CLAIM REWARD</p>
            <input type="text" id="igInput" placeholder="INSTAGRAM HANDLE">
            <button class="btn btn-brand" id="claimBtn" style="color:#fff; width:100%;">CONFIRM WITH MARC</button>
          </div>
        </div>
      </div>
    </section>

    <section class="leaderboard-container">
      <div id="uiMyth" style="font-weight:900; margin-bottom:8px; color:var(--danger);">30 BOXES: NOBODY</div>
      <div class="leaderboard-title">Global Elite Ranking (Top 10)</div>
      <div id="leaderboardList"></div>
    </section>
  </main>

  <script>
    // ======================================================
    // 1. MASTER CONFIGURATION (KONTROLLZENTRUM)
    // ======================================================
    const CLIENT_CONFIG = {
        // --- 1. SYSTEM & DATENBANK ---
        id: "leaderboard_marc", // Eindeutige ID fuer die Datenbank
        minScoreToSave: 1,      // Mindestens 1 Treffer (3 Boxen) noetig fuer Leaderboard
        easterEggScore: 29,     // Bei Score 29 (31 Boxen) ist das Spiel gewonnen
        
        // --- 2. VISUELLE IDENTITAET ---
        pageTitle: "MG PRECISION | FOCUS SYSTEM",
        brandTitle: "UNAUFHALTSAM",
        brandSub: "MG PRECISION CHALLENGE",
        brandColor: "#c5a059", // Hauptfarbe
        logoFileName: "marc-logo", // Dateiname des Logos (ohne .png)
        
        // --- 3. TEXTE & KOMMUNIKATION ---
        startDesc: "Focus the right box. Losing is instant.",
        gameOverFail: "SYSTEM FAILED",
        rewardTitle: "ELITE STATUS: CLAIM REWARD",
        rewardInputPlaceholder: "INSTAGRAM HANDLE",
        rewardBtnText: "CONFIRM WITH MARC",
        rewardSuccessMsg: "CLAIMED. MARC WILL BE NOTIFIED.",
        
        // --- 4. KI ZITATE (Dynamisch nach Score) ---
        quotes: [
            '"Fokus verloren. In der Zeit habe ich drei Uhren verkauft."',          // 0 - 5 Boxen
            '"Einstieg ist gemacht. Aber für eine Patek reicht das noch nicht."',   // 6 - 10 Boxen
            '"Du wirst wach. Aber wir machen hier Business, keine Spielchen."',     // 11 - 15 Boxen
            '"Gute Performance. Da erkenne ich langsam den Macher-Instinkt."',      // 16 - 20 Boxen
            '"Stark. Mit dieser Präzision hättest du den Deal heute durchgezogen."',// 21 - 25 Boxen
            '"Absolute Elite. Du hast das System dominiert. Respekt."'              // 26+ Boxen
        ]
    };

    // ======================================================
    // SYSTEM INITIALISIERUNG (Config anwenden)
    // ======================================================
    document.title = CLIENT_CONFIG.pageTitle;
    document.getElementById("uiBrandTitle").textContent = CLIENT_CONFIG.brandTitle;
    document.getElementById("uiBrandSub").textContent = CLIENT_CONFIG.brandSub;
    document.getElementById("uiStartDesc").textContent = CLIENT_CONFIG.startDesc;
    document.getElementById("uiGameOverFail").textContent = CLIENT_CONFIG.gameOverFail;
    document.getElementById("uiRewardTitle").textContent = CLIENT_CONFIG.rewardTitle;
    document.getElementById("igInput").placeholder = CLIENT_CONFIG.rewardInputPlaceholder;
    document.getElementById("claimBtn").textContent = CLIENT_CONFIG.rewardBtnText;
    document.documentElement.style.setProperty('--brand-color', CLIENT_CONFIG.brandColor);

    // ======================================================
    // 2. FIREBASE ENGINE
    // ======================================================
    const firebaseConfig = {
      apiKey: "AIzaSyC0olKESyTP0rXUlnjGstLlGN50I1m_O2A",
      authDomain: "mg-challenge.firebaseapp.com",
      projectId: "mg-challenge",
      storageBucket: "mg-challenge.firebasestorage.app",
      messagingSenderId: "472289048663",
      appId: "1:472289048663:web:cc68ded6007e1e822c4b12"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const dbRef = db.collection(CLIENT_CONFIG.id);

    // ======================================================
    // 3. GAME ENGINE LOGIC
    // ======================================================
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // AGGRESSIVES FALLBACK FUER BILDER (Inkl. Absolute GitHub-Links als Rettungsanker)
    const imgLogo = new Image(); 
    let fallbackIndex = 0;
    let logoStatus = "LAEDT";
    let logoError = false;
    
    // Fallback Array: Falls lokale Tests (file://) oder Adblocker blockieren, ziehen wir das Bild live aus deinem Repo
    const fallbacks = [
        `${CLIENT_CONFIG.logoFileName}.png`,
        `./${CLIENT_CONFIG.logoFileName}.png`,
        "gebauer-logo.png",
        "logo.png",
        "marc-logo.png",
        "https://focus-system-unaufhaltsam.github.io/marcgebauer/marc-logo.png", // Ultimativer Fallback 1
        "https://focus-system-unaufhaltsam.github.io/marcgebauer/gebauer-logo.png" // Ultimativer Fallback 2
    ];

    function loadNextFallback() {
        if (fallbackIndex < fallbacks.length) {
            console.log("[SYSTEM] Pruefe Bildpfad:", fallbacks[fallbackIndex]);
            imgLogo.src = fallbacks[fallbackIndex];
        } else {
            logoStatus = "FEHLER";
            logoError = true;
            console.error("[SYSTEM FEHLER] Alle Bilder blockiert oder nicht gefunden. Hast du einen AdBlocker aktiviert?");
        }
    }

    imgLogo.onload = () => { 
        console.log("[SYSTEM] ERFOLG! Bild geladen:", imgLogo.src);
        logoStatus = "OK"; 
        logoError = false; 
    };
    imgLogo.onerror = () => { 
        console.warn("[SYSTEM] Fehlschlag fuer Pfad:", fallbacks[fallbackIndex]);
        fallbackIndex++;
        loadNextFallback();
    };
    
    // Start Loading
    loadNextFallback();
    
    const BEST_KEY = "focusBest_" + CLIENT_CONFIG.id;

    let state = {
      running: false, score: 0, startTime: 0, totalTime: 0,
      phase: "idle", phaseStartedAt: 0, boxes: [], 
      correctId: null, selectedId: null, swapsRemaining: 0, activeSwap: null,
      showBallTime: 1400, breatherMs: 300
    };

    function getAIQuote(score) {
        if (score <= 5) return CLIENT_CONFIG.quotes[0];
        if (score <= 10) return CLIENT_CONFIG.quotes[1];
        if (score <= 15) return CLIENT_CONFIG.quotes[2];
        if (score <= 20) return CLIENT_CONFIG.quotes[3];
        if (score <= 25) return CLIENT_CONFIG.quotes[4];
        return CLIENT_CONFIG.quotes[5];
    }

    function buildRound() {
      if (state.score >= CLIENT_CONFIG.easterEggScore) { finish(true); return; }
      state.boxes = []; state.selectedId = null; state.activeSwap = null;
      const count = Math.min(30, 2 + state.score);
      const cols = Math.ceil(Math.sqrt(count));
      const boxW = Math.max(45, Math.min(92, (canvas.width - 160) / cols - 24));
      const gridW = cols * boxW + (cols - 1) * 24;
      const startX = (canvas.width - gridW) / 2; 
      const startY = 160 + ((canvas.height - 200) - (Math.ceil(count / cols) * boxW + (Math.ceil(count / cols) - 1) * 24)) / 2;

      for (let i = 0; i < count; i++) {
        state.boxes.push({ id: i, x: startX + (i % cols) * (boxW + 24), y: startY + Math.floor(i / cols) * (boxW + 24), w: boxW, h: boxW, lift: 0 });
      }
      state.correctId = Math.floor(Math.random() * count);
      state.swapsRemaining = Math.max(4, 3 + Math.floor(count * 1.5));
      state.showBallTime = state.score >= 14 ? 1000 : 1400;
      setPhase("show");
      updateHud();
    }

    function startNextSwap() {
      if (state.swapsRemaining <= 0) { state.activeSwap = null; setPhase("wait"); return; }
      let a, b;
      if (Math.random() < 0.6) {
        a = state.boxes.findIndex(box => box.id === state.correctId);
        b = Math.floor(Math.random() * state.boxes.length);
        while (b === a) b = Math.floor(Math.random() * state.boxes.length);
      } else {
        a = Math.floor(Math.random() * state.boxes.length);
        b = Math.floor(Math.random() * state.boxes.length);
        while (b === a) b = Math.floor(Math.random() * state.boxes.length);
      }
      state.activeSwap = {
        aId: state.boxes[a].id, bId: state.boxes[b].id, 
        aStartX: state.boxes[a].x, bStartX: state.boxes[b].x, aStartY: state.boxes[a].y, bStartY: state.boxes[b].y,
        aTargetX: state.boxes[b].x, bTargetX: state.boxes[a].x, aTargetY: state.boxes[b].y, bTargetY: state.boxes[a].y,
        start: performance.now(), duration: Math.max(140, (2200 - state.score * 90) / 7.5)
      };
      state.swapsRemaining--;
    }

    function update(ts) {
      if (!state.running) return;
      if (state.phase === "show" && ts - state.phaseStartedAt > state.showBallTime) { setPhase("shuffle"); startNextSwap(); }
      else if (state.phase === "shuffle") {
        if (!state.activeSwap) { startNextSwap(); return; }
        const s = state.activeSwap, p = Math.min(1, (ts - s.start) / s.duration), e = p < 0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;
        const bA = state.boxes.find(b => b.id === s.aId), bB = state.boxes.find(b => b.id === s.bId);
        if(bA && bB) {
            bA.x = s.aStartX + (s.aTargetX - s.aStartX) * e; bB.x = s.bStartX + (s.bTargetX - s.bStartX) * e;
            bA.y = s.aStartY + (s.aTargetY - s.aStartY) * e; bB.y = s.bStartY + (s.bTargetY - s.bStartY) * e;
            if (p >= 1) { bA.x = s.aTargetX; bA.y = s.aTargetY; bB.x = s.bTargetX; bB.y = s.bTargetY; state.activeSwap = null; }
        }
      } else if (state.phase === "wait" && ts - state.phaseStartedAt > state.breatherMs) setPhase("pick");
      else if (state.phase === "reveal") {
        const sel = state.boxes.find(b => b.id === state.selectedId), cor = state.boxes.find(b => b.id === state.correctId);
        if (sel) sel.lift = Math.min(sel.h * 0.8, sel.lift + 5);
        if (cor && cor.id !== state.selectedId) cor.lift = Math.min(cor.h * 0.8, cor.lift + 5);
        if (ts - state.phaseStartedAt > 1200) {
            if (state.selectedId === state.correctId) { state.score++; buildRound(); }
            else { if(state.score >= 18) setTimeout(() => finish(false), 600); else finish(false); }
        }
      }
      if (state.phase !== "reveal") state.boxes.forEach(b => b.lift = Math.max(0, b.lift - 6));
    }

    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      state.boxes.forEach(box => {
        const y = box.y - box.lift;
        ctx.save();
        
        ctx.fillStyle = "#fff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
        ctx.strokeRect(box.x, y, box.w, box.h); ctx.fillRect(box.x, y, box.w, box.h);
        
        // --- LOGO RENDER LOGIK ---
        if (logoStatus === "OK" && imgLogo.naturalWidth > 0) {
            ctx.drawImage(imgLogo, box.x + box.w * 0.04, y + box.h * 0.04, box.w * 0.92, box.h * 0.92);
        } else if (logoStatus === "FEHLER" || logoError) {
            // Stylischer Text-Fallback (MG) fuer die Vorschau oder falls das Bild fehlt
            ctx.save();
            ctx.fillStyle = CLIENT_CONFIG.brandColor;
            ctx.font = `900 ${Math.floor(box.w * 0.4)}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("MG", box.x + box.w / 2, y + box.h / 2);
            ctx.restore();
        }

        if (state.phase === "show" && box.id === state.correctId) {
            ctx.save(); const pulse = Math.sin(performance.now() / 150) * 0.2 + 0.8; ctx.globalAlpha = pulse;
            ctx.strokeStyle = CLIENT_CONFIG.brandColor; ctx.lineWidth = 6; ctx.strokeRect(box.x - 4, y - 4, box.w + 8, box.h + 8);
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)"; ctx.fillRect(box.x, y, box.w, box.h);
            ctx.font = `900 ${Math.floor(box.w * 0.24)}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.strokeStyle = "#000"; ctx.lineWidth = 4; ctx.strokeText("FOCUS", box.x + box.w/2, y + box.h/2);
            ctx.fillStyle = "#fff"; ctx.fillText("FOCUS", box.x + box.w/2, y + box.h/2); ctx.restore();
        }

        if (state.phase === "reveal" && box.id === state.correctId) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.7)"; ctx.fillRect(box.x, y, box.w, box.h);
            ctx.fillStyle = CLIENT_CONFIG.brandColor; ctx.font = `${box.w * 0.5}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText("👑", box.x + box.w/2, y + box.h/2);
        }
        if (state.phase === "reveal" && box.id === state.selectedId) {
            ctx.strokeStyle = (state.selectedId === state.correctId ? "#0f9d58" : "#d92d20");
            ctx.lineWidth = 6; ctx.strokeRect(box.x - 4, y - 4, box.w + 8, box.h + 8);
        }
        ctx.restore();
      });
    }

    function finish(victory) {
      state.running = false;
      state.totalTime = (performance.now() - state.startTime) / 1000;
      document.getElementById("gameOverOverlay").classList.remove("hidden");
      const finalBoxes = Math.min(30, state.score + 2);
      document.getElementById("finalScore").textContent = finalBoxes + " BOXES";
      document.getElementById("finalTime").textContent = `TIME: ${state.totalTime.toFixed(2)}s`;
      document.getElementById("aiText").textContent = getAIQuote(state.score);
      
      if (finalBoxes >= 30 || victory) document.getElementById("rewardSection").style.display = "block";
      if (state.score >= CLIENT_CONFIG.minScoreToSave) document.getElementById("nameOverlay").classList.remove("hidden");
    }

    function setPhase(p) { state.phase = p; state.phaseStartedAt = performance.now(); }
    function updateHud() {
        const best = Number(localStorage.getItem(BEST_KEY) || 0);
        document.getElementById("boxValue").textContent = Math.min(30, state.score + 2);
        document.getElementById("bestValue").textContent = Math.min(30, best + 2);
    }

    canvas.onmousedown = e => { const r = canvas.getBoundingClientRect(); handleInteraction((e.clientX - r.left)*(canvas.width/r.width), (e.clientY - r.top)*(canvas.height/r.height)); };
    canvas.ontouchstart = e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); handleInteraction((e.touches[0].clientX - r.left)*(canvas.width/r.width), (e.touches[0].clientY - r.top)*(canvas.height/r.height)); };

    function handleInteraction(x, y) {
      if (state.phase === "pick") {
        state.boxes.forEach(b => { if (x >= b.x && x <= b.x + b.w && y >= b.y - b.lift && y <= b.y - b.lift + b.h) { state.selectedId = b.id; setPhase("reveal"); } });
      }
    }

    document.getElementById("startBtn").onclick = () => { state.running = true; state.score = 0; state.startTime = performance.now(); document.getElementById("startOverlay").classList.add("hidden"); buildRound(); };
    document.getElementById("restartBtn").onclick = () => location.reload();
    document.getElementById("resetBtn").onclick = () => location.reload();
    
    // ======================================================
    // ELITE LEADERBOARD SPEICHER LOGIK
    // ======================================================
    document.getElementById("saveScoreBtn").onclick = async () => {
        const rawName = document.getElementById("nameInput").value.trim().toUpperCase();
        // Bereinigen: Nur Buchstaben und Zahlen erlauben (Sicherheit fuer DB)
        const name = rawName.replace(/[^A-Z0-9]/g, ''); 
        const errorEl = document.getElementById("errorMsg");

        if (!name) { errorEl.textContent = "BITTE REALEN NAMEN WAEHLEN"; errorEl.style.display = "block"; return; }

        // Score berechnen (Was der User sieht)
        const displayScore = state.score + 2;

        // REGEL 1: Keine Nullnummern & Mindestgrenze aus Config
        if (state.score < CLIENT_CONFIG.minScoreToSave) {
            errorEl.textContent = "ZU SCHWACH FUER DAS SYSTEM.";
            errorEl.style.display = "block";
            setTimeout(() => location.reload(), 2000);
            return;
        }

        document.getElementById("saveScoreBtn").disabled = true;

        try {
            // REGEL 2: Name ist die eindeutige ID (Jeder kann nur einmal rein)
            const userDocRef = dbRef.doc(name);
            const docSnap = await userDocRef.get();

            if (docSnap.exists) {
                const existingData = docSnap.data();
                // Check: Ist der neue Score besser?
                if (displayScore <= existingData.score) {
                    errorEl.textContent = "KEINE VERBESSERUNG. NUR DEIN BESTWERT ZAEHLT.";
                    errorEl.style.display = "block";
                    setTimeout(() => location.reload(), 2000);
                    return;
                }
            }

            // Schreiben / Ueberschreiben mit neuem Bestwert
            const finalScoreToSave = Math.min(CLIENT_CONFIG.easterEggScore + 2, displayScore);
            await userDocRef.set({
                name: name,
                score: finalScoreToSave,
                time: state.totalTime,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            if (state.score > (Number(localStorage.getItem(BEST_KEY)) || 0)) {
                localStorage.setItem(BEST_KEY, state.score);
            }
            location.reload();
        } catch (e) {
            console.error(e);
            errorEl.textContent = "NETZWERKFEHLER. VERSUCHE ES ERNEUT.";
            errorEl.style.display = "block";
            document.getElementById("saveScoreBtn").disabled = false;
        }
    };

    document.getElementById("claimBtn").onclick = async () => {
        const ig = document.getElementById("igInput").value.trim();
        if (!ig) return;
        const claimCollection = "claims_" + CLIENT_CONFIG.id.replace("leaderboard_", "");
        await db.collection(claimCollection).doc(auth.currentUser.uid).set({ 
            ig: ig, score: state.score, time: state.totalTime, timestamp: firebase.firestore.FieldValue.serverTimestamp() 
        });
        document.getElementById("rewardSection").innerHTML = `<p style='font-size:12px; font-weight:900; color:var(--success)'>${CLIENT_CONFIG.rewardSuccessMsg}</p>`;
    };

    // ======================================================
    // TOP 10 ANZEIGE LOGIK (Inkl. JavaScript Sortier-Fix)
    // ======================================================
    auth.onAuthStateChanged(user => {
      if (user) {
        // REGEL 3: Alle Daten abrufen und in JavaScript sortieren (verhindert Firestore-Index-Fehler)
        dbRef.onSnapshot(snap => {
          let allEntries = [];
          snap.forEach(d => allEntries.push(d.data()));
          
          // Sortieren: Hoechster Score zuerst, bei Gleichstand schnellste Zeit
          allEntries.sort((a, b) => {
             if (b.score !== a.score) return b.score - a.score;
             const timeA = typeof a.time === 'number' ? a.time : 999;
             const timeB = typeof b.time === 'number' ? b.time : 999;
             return timeA - timeB;
          });

          // Auf die besten 10 limitieren
          const top10 = allEntries.slice(0, 10);

          const list = document.getElementById("leaderboardList"); 
          list.innerHTML = "";
          let rank = 1;
          top10.forEach(data => {
            const tm = typeof data.time === 'number' ? data.time.toFixed(1) + "s" : "N/A";
            list.innerHTML += `
              <li class="leaderboard-entry">
                <div class="rank-name">
                    <span class="rank-number">#${rank}</span>
                    <span>${data.name}</span>
                </div>
                <span>${data.score} BOXES <span style="font-size:10px; opacity:0.5;">(${tm})</span></span>
              </li>`;
            rank++;
          });
        }, error => {
           console.error("Leaderboard Fehler:", error);
        });
      }
    });
    auth.signInAnonymously();

    function loop(ts) { update(ts); draw(); requestAnimationFrame(loop); }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
